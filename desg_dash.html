<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <script src="https://sky.blackbaudcdn.net/static/sky-addin-client/1/sky-addin-client.umd.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #ffffff; }
        /* Make the iframe fill the tile area perfectly */
        iframe { border: none; width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <iframe src="https://argos.evisions.app/embed?DataBlockId=4270&server=https%3A%2F%2Fmaps.suu.edu%3A443" id="argosFrame"></iframe>

    <script>
        function startAddin() {
            if (window.BBSkyAddinClient) {
                var client = new BBSkyAddinClient.AddinClient({
                    callbacks: {
                        init: function(args) {
                            // Tell NXT to show the tile
                            args.ready({
                                showUI: true,
                                title: 'Argos Enrollment Stats' // You can change this title
                            });
                        }
                    }
                });
            } else {
                setTimeout(startAddin, 50);
            }
        }
        startAddin();
    </script>
</body>
</html>

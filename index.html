<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <script src="https://sky.blackbaudcdn.net/static/sky-addin-client/1/sky-addin-client.umd.min.js"></script>
</head>
<body>
    <div style="font-family: sans-serif; padding: 10px;">
        <h3 style="margin-top:0;">Advancement Links</h3>
        <ul style="line-height: 1.6;">
            <li><a href="https://docs.google.com/forms/d/e/1FAIpQLSe6fX20spfS1JmcvGUpn0Ns-5SzONxDhNRK4APf00iHkX5_Lw/viewform" target="_blank">Record a Gift or Pledge, Request a new Fund</a></li>
            <li><a href="https://docs.google.com/forms/d/e/1FAIpQLSfBFZ9qikVh4bECaNYbLTC6iR83d_kye5rtZAQV5n4rN3DUiw/viewform" target="_blank">Request Research</a></li>
            <li><a href="https://forms.suu.edu/t/4uwCe3PeaFus" target="_blank">Request Project Support and Lists</a></li>
            <li><a href="https://maps.suu.edu/Argos/AWV/#explorer/SUU%20Banner%00Advancement%00Scholarships/Account%20Balance%20for%20Desgs" target="_blank">Scholarship and Fund Desg Dashboard</a></li>
            <li><a href="https://my.suu.edu/directory/employee/" target="_blank">SUU Employee Directory</a></li>
        </ul>
    </div>

    <script>
        // 2. The "Library Guard" function
        function initAddin() {
            // Check if the Blackbaud library is loaded yet
            if (window.BBSkyAddinClient) {
                console.log("Library found! Starting handshake...");
                
                var client = new BBSkyAddinClient.AddinClient({
                    callbacks: {
                        init: function(args) {
                            // 3. THE HANDSHAKE
                            args.ready({
                                showUI: true,
                                title: 'Advancement Link Library'
                            });
                        }
                    }
                });
            } else {
                // If not loaded, wait 50ms and try again
                console.log("Library not ready, retrying...");
                setTimeout(initAddin, 50);
            }
        }

        // Start the check
        initAddin();
    </script>
</body>
</html>

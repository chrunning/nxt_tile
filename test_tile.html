<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <script src="https://sky.blackbaudcdn.net/static/sky-addin-client/1/sky-addin-client.umd.min.js"></script>
</head>
<body>
    <div style="font-family: sans-serif; padding: 10px;">
        <h3 id="tile-title" style="margin-top:0;">Gift Intake</h3>
        
        <a id="giftBtn" href="https://script.google.com/macros/s/AKfycbyIUY6YWyPbSewodEyAoEvTNy_-AkL-RXHLmW18dksoGrWlrRRkAcX0bYrkjk8WkSNUJA/exec" target="_blank" 
           style="background-color: #d04437; color: white; padding: 10px 20px; text-decoration: none; display: inline-block; border-radius: 4px; font-weight: bold;">
           Open Gift Form
        </a><br>
        <a href="#" 
       onclick="window.top.location.href='https://script.google.com/macros/s/AKfycbyIUY6YWyPbSewodEyAoEvTNy_-AkL-RXHLmW18dksoGrWlrRRkAcX0bYrkjk8WkSNUJA/exec'; return false;"
       style="background-color: #d04437; color: white; padding: 12px 20px; text-decoration: none; display: inline-block; border-radius: 4px; font-weight: bold;">
       TEST REDIRECT
        </a>

        <p id="status" style="font-size: 11px; color: #666; margin-top: 10px;">Initializing...</p>
    </div>

    <script>
        function initAddin() {
            // Use the "Library Guard" that worked in your LINKS html
            if (window.BBSkyAddinClient) {
                
                var client = new BBSkyAddinClient.AddinClient({
                    callbacks: {
                        init: function(args) {
                            // 1. SUCCESS! The tile is now "awake"
                            document.getElementById('status').innerText = "Connected to Record: " + args.context.recordId;

                            // 2. THE HANDSHAKE (Makes the tile visible)
                            args.ready({
                                showUI: true,
                                title: 'Gift Intake Tool'
                            });
                        }
                    }
                });

                // Export client to window so we can grab it from the console
                window.client = client;

            } else {
                // Retry if library isn't ready
                setTimeout(initAddin, 50);
            }
        }

        initAddin();
    </script>
</body>
</html>

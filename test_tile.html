<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <script src="https://sky.blackbaudcdn.net/static/sky-addin-client/1/sky-addin-client.umd.min.js"></script>
</head>
<body>
    <div style="font-family: sans-serif; padding: 10px;">
        <h3 id="tile-title" style="margin-top:0;">Gift Intake</h3>
        
        <a href="https://script.google.com/macros/s/AKfycbyIUY6YWyPbSewodEyAoEvTNy_-AkL-RXHLmW18dksoGrWlrRRkAcX0bYrkjk8WkSNUJA/exec" 
       target="_blank" 
       rel="noopener noreferrer"
       style="background-color: #d04437; color: white; padding: 12px 20px; text-decoration: none; display: inline-block; border-radius: 4px; font-weight: bold;">
       OPEN GIFT FORM
        </a>

        <p id="status" style="font-size: 11px; color: #666; margin-top: 10px;">Initializing...</p>
    </div>
<div style="margin-top: 10px;">
    <label style="font-size: 10px; font-weight: bold; color: #999;">DEBUG: IDENTITY TOKEN</label>
    <div id="token-debug" style="font-family: monospace; font-size: 9px; background: #eee; padding: 5px; height: 40px; overflow-y: scroll; border: 1px solid #ccc; word-break: break-all;">
        Waiting for token...
    </div>
</div>
<script>
    function initAddin() {
        if (window.BBSkyAddinClient) {
            var client = new BBSkyAddinClient.AddinClient({
                callbacks: {
                    init: function(args) {
                        // 1. Start the Token request immediately
                        client.getUserIdentityToken().then(function(token) {
                            const recordId = args.context.recordId;
                            
                            const gasUrl = "https://script.google.com/macros/s/AKfycbyIUY6YWyPbSewodEyAoEvTNy_-AkL-RXHLmW18dksoGrWlrRRkAcX0bYrkjk8WkSNUJA/exec";
                            
                            // 2. Build the final secure link
                            const finalUrl = gasUrl + "?guid=" + recordId + "&token=" + token;
                            document.getElementById('token-debug').innerText = token;
                            // 3. Update the UI
                            document.getElementById('giftBtn').href = finalUrl;
                            document.getElementById('status').innerText = "Security Token Generated.";

                            // 4. THE HANDSHAKE (Only show UI once the link is ready)
                            args.ready({
                                showUI: true,
                                title: 'Gift Intake Tool'
                            });
                        });
                    }
                }
            });

            window.client = client;

        } else {
            setTimeout(initAddin, 50);
        }
    }

    initAddin();
</script>
</body>
</html>

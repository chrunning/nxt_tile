<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <script src="https://sky.blackbaudcdn.net/static/sky-addin-client/1/sky-addin-client.umd.min.js"></script>
    <script src="sky_logic.js"></script>
</head>
<body>
    <div style="font-family: sans-serif; padding: 10px;">
        <h3 id="tile-title" style="margin-top:0;">Gift Intake</h3>
        
        <a id="giftBtn" 
           href="#" 
           target="_blank" 
           rel="noopener noreferrer"
           style="background-color: #d04437; color: white; padding: 12px 20px; text-decoration: none; display: inline-block; border-radius: 4px; font-weight: bold;">
           OPEN GIFT FORM
        </a>

        <p id="status" style="font-size: 11px; color: #666; margin-top: 10px;">Initializing...</p>
    </div>

    <script>
        function initAddin() {
            // 1. STRENGTHENED CHECK: Ensure SkyLogic AND the Vault are ready
            if (typeof SkyLogic !== 'undefined' && SkyLogic.decodeVault && window.BBSkyAddinClient) {
                
                var client = new BBSkyAddinClient.AddinClient({
                    callbacks: {
                        init: function(args) {
                            // 2. Pull the URL from your JS file's vault
                            const gasUrl = SkyLogic.decodeVault('gas');

                            if (gasUrl) {
                                document.getElementById('giftBtn').href = gasUrl;
                                document.getElementById('status').innerText = "Secure Connection Ready.";
                            } else {
                                document.getElementById('status').innerText = "Error: Vault failed.";
                            }

                            args.ready({
                                showUI: true,
                                title: 'Gift Intake Tool'
                            });
                        }
                    }
                });
            } else {
                // 3. If not ready, wait 100ms and try again
                console.log("Libraries not ready yet, retrying...");
                setTimeout(initAddin, 100);
            }
        }

        // Start the loop
        initAddin();
    </script>
</body>
</html>

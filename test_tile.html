<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <script src="https://sky.blackbaudcdn.net/static/sky-addin-client/1/sky-addin-client.umd.min.js"></script>
    <script src="https://chrunning.github.io/nxt_tile/sky_logic.js"></script>
</head>
<body>
    <div style="font-family: sans-serif; padding: 10px;">
        <h3 id="tile-title" style="margin-top:0;">Gift Intake</h3>
        
<a id="giftBtn" 
           href="#" 
           target="_blank" 
           rel="noopener noreferrer"
           style="background-color: #d04437; color: white; padding: 12px 20px; text-decoration: none; display: inline-block; border-radius: 4px; font-weight: bold;">
           OPEN GIFT FORM
        </a>

        <p id="status" style="font-size: 11px; color: #666; margin-top: 10px;">Initializing...</p>
    </div>

<script>
        function initAddin() {
            // Check if both libraries are loaded
            if (window.BBSkyAddinClient && window.SkyLogic) {
                
                var client = new BBSkyAddinClient.AddinClient({
                    callbacks: {
                        init: function(args) {
                            // Call the function from your external sky_logic.js file
                            const gasUrl = SkyLogic.decodeVault('gas');

                            if (gasUrl) {
                                document.getElementById('giftBtn').href = gasUrl;
                                document.getElementById('status').innerText = "System Ready.";
                            } else {
                                document.getElementById('status').innerText = "Configuration Error.";
                            }

                            args.ready({
                                showUI: true,
                                title: 'Gift Intake Tool'
                            });
                        }
                    }
                });
            } else {
                // Retry if scripts aren't fully parsed yet
                setTimeout(initAddin, 50);
            }
        }

        initAddin();
    </script>
</body>
</html>
